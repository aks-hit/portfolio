name: Sync portfolio content and deploy

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/sync-profile.mjs'
      - 'src/**'
      - 'package*.json'
      - 'next.config.js'
      - '.github/workflows/portfolio-sync-deploy.yml'
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync resume and LinkedIn content
        run: npm run sync:profile

      - name: Build static portfolio
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static export
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
