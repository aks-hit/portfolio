name: Validate portfolio build

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/sync-profile.mjs'
      - 'src/**'
      - 'package*.json'
      - 'next.config.js'
      - '.github/workflows/portfolio-sync-deploy.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync resume and LinkedIn content
        run: npm run sync:profile

      - name: Build portfolio
        run: npm run build
